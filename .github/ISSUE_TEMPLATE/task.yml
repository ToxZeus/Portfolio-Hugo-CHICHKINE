name: Tache technique
description: Suivre une tache technique / Track technical work
labels: ["chore"]
body:
  - type: markdown
    attributes:
      value: |
        Vous pouvez repondre en francais ou en anglais.
        You can answer in French or English.

  - type: input
    id: summary
    attributes:
      label: Titre de la tache / Task title
      placeholder: Ex. Nettoyer les scripts JS inutilises / Clean up unused JS scripts
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexte / Context
      description: Pourquoi cette tache est necessaire ? / Why is this task needed?
      placeholder: Ex. Simplifier la maintenance et reduire la dette technique / Simplify maintenance and reduce technical debt
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Perimetre / Scope
      description: Fichiers, modules ou zones impactes / Files, modules, or impacted areas
      placeholder: Ex. public/assets/js/*.js / app/controllers/*

  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      description: Liste d'actions a realiser / Action checklist
      placeholder: |
        - [ ] Identifier le code mort / Identify dead code
        - [ ] Supprimer les references / Remove references
        - [ ] Verifier le fonctionnement global / Validate overall behavior
        - [ ] Mettre a jour la documentation / Update documentation

  - type: textarea
    id: definition_of_done
    attributes:
      label: Definition of done
      placeholder: Ex. Build OK, tests manuels valides, PR relue et mergee / Build OK, manual tests passed, PR reviewed and merged

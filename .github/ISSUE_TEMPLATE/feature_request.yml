name: Feature request
description: Proposer une fonctionnalite / Request a feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Decris le besoin metier et la valeur apportee.
        Describe the business need and expected value.
        Vous pouvez repondre en francais ou en anglais.
        You can answer in French or English.

  - type: input
    id: summary
    attributes:
      label: Intitule de la fonctionnalite / Feature title
      placeholder: Ex. Ajouter un mode sombre / Add a dark mode
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Probleme a resoudre / Problem to solve
      description: Quel probleme actuel cette fonctionnalite adresse-t-elle ? / Which current problem does this solve?
      placeholder: Ex. La lecture de nuit est difficile sur fond clair / Night reading is difficult on a bright background
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposition de solution / Proposed solution
      description: Decris la solution idealement attendue / Describe the expected solution
      placeholder: Ex. Ajouter un toggle dans la navigation et conserver la preference / Add a navigation toggle and persist preference
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives envisagees / Alternatives considered
      description: Autres approches possibles / Other possible approaches
      placeholder: Ex. Changer automatiquement selon les preferences systeme / Auto-switch from system preferences

  - type: textarea
    id: acceptance
    attributes:
      label: Criteres d'acceptation / Acceptance criteria
      description: Liste des conditions de validation / Validation checklist
      placeholder: |
        - Le toggle est visible sur mobile et desktop / Toggle is visible on mobile and desktop
        - Le choix est persiste / Choice is persisted
        - Le contraste respecte WCAG AA / Contrast meets WCAG AA
